id: release-refine
name: Release Refine
version: 1
goal: Take a seeded refinement initiative to a merged PR — decompose, build across work items, unify to one PR, verify. No architect interview; the initiative comes from the project roadmap + manifest.
project: null
kb: cycles
costCeilingUsd: 80
origin: user
nodes:
  - { id: pm, agent: project-manager }
  - { id: dev, agent: developer-ralph, fanOut: work-items }
  - { id: unifier, agent: developer-unifier, resumable: true }
  - { id: review, gate: verdict }
edges:
  - { from: pm, to: dev, artifact: work-items }
  - { from: dev, to: unifier, artifact: wi-branches }
  - { from: unifier, to: review, artifact: pr }
triggers: []
