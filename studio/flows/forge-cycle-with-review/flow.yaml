id: forge-cycle-with-review
name: Forge Cycle (with automated review)
version: 1
goal: Take an approved initiative to a merged PR, with an automated code-review pass before the human verdict gate.
project: null
kb: cycles
costCeilingUsd: 30
origin: ootb-library
nodes:
