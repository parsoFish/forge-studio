<body><div class="mxgraph" style="max-width:100%;border:1px solid transparent;" data-mxgraph="{&quot;highlight&quot;:&quot;#0000ff&quot;,&quot;nav&quot;:true,&quot;resize&quot;:true,&quot;dark-mode&quot;:&quot;auto&quot;,&quot;toolbar&quot;:&quot;zoom layers tags lightbox&quot;,&quot;edit&quot;:&quot;_blank&quot;,&quot;xml&quot;:&quot;&lt;mxfile host=\&quot;app.diagrams.net\&quot;&gt;\n  &lt;diagram name=\&quot;Page-1\&quot; id=\&quot;KXUlAB-llrlyqwVdD1nt\&quot;&gt;\n    &lt;mxGraphModel dx=\&quot;2712\&quot; dy=\&quot;2205\&quot; grid=\&quot;1\&quot; gridSize=\&quot;10\&quot; guides=\&quot;1\&quot; tooltips=\&quot;1\&quot; connect=\&quot;1\&quot; arrows=\&quot;1\&quot; fold=\&quot;1\&quot; page=\&quot;1\&quot; pageScale=\&quot;1\&quot; pageWidth=\&quot;827\&quot; pageHeight=\&quot;1169\&quot; math=\&quot;0\&quot; shadow=\&quot;0\&quot;&gt;\n      &lt;root&gt;\n        &lt;mxCell id=\&quot;0\&quot; /&gt;\n        &lt;mxCell id=\&quot;1\&quot; parent=\&quot;0\&quot; /&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-13\&quot; connectable=\&quot;0\&quot; parent=\&quot;1\&quot; style=\&quot;group\&quot; value=\&quot;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;340\&quot; width=\&quot;430\&quot; x=\&quot;-260\&quot; y=\&quot;-340\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-1\&quot; parent=\&quot;fAGNB5-M9GKBdq2qCchY-13\&quot; style=\&quot;swimlane;whiteSpace=wrap;html=1;\&quot; value=\&quot;Brain\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;340\&quot; width=\&quot;430\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-12\&quot; parent=\&quot;fAGNB5-M9GKBdq2qCchY-13\&quot; style=\&quot;text;html=1;whiteSpace=wrap;strokeColor=none;fillColor=none;align=left;verticalAlign=middle;rounded=0;\&quot; value=\&quot;- Karparthy LLM-Wiki&amp;lt;div&amp;gt;- multi level llm-wiki&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- brain is used as first source of knowledge by all other components of forge&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- top level is knowledge base relating to the forge system overall, best practices, research on latest AI best practices and tooling, learnings from feature cycles through the forge system&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- sub levels for each project within forge containing the same kind of learnings and best practices scoped to specific projects&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- brain itself is made up of several agent components:&amp;lt;/div&amp;gt;&amp;lt;blockquote style=&amp;quot;margin: 0px 0px 0px 40px; border-width: medium; border-style: none; border-color: currentcolor; border-image: initial; padding: 0px;&amp;quot;&amp;gt;&amp;lt;div&amp;gt;- Ingest agent responsible for creation of new wiki pages based on research or learnings sent to the ingest agent&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- Linting agent responsible for consistent maintenance of the wiki, self correcting conflicting information when the agent is able to confidently determine stale or conflicting information, and raising conflicts for user review when its own confidence is not high enough&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- agent skills for use by other agents in order to pull information from the wiki efficiently&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- graph based visualisation (through obsidian as described in the original gist is likely best) that also ensures efficient search by agents using it while doubling as the visual layer for humans&amp;lt;/div&amp;gt;&amp;lt;/blockquote&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;320\&quot; width=\&quot;430\&quot; y=\&quot;20\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-14\&quot; connectable=\&quot;0\&quot; parent=\&quot;1\&quot; style=\&quot;group\&quot; value=\&quot;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;340\&quot; width=\&quot;430\&quot; x=\&quot;-260\&quot; y=\&quot;180\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-15\&quot; parent=\&quot;fAGNB5-M9GKBdq2qCchY-14\&quot; style=\&quot;swimlane;whiteSpace=wrap;html=1;\&quot; value=\&quot;Architect\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;340\&quot; width=\&quot;430\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-16\&quot; parent=\&quot;fAGNB5-M9GKBdq2qCchY-14\&quot; style=\&quot;text;html=1;whiteSpace=wrap;strokeColor=none;fillColor=none;align=left;verticalAlign=middle;rounded=0;\&quot; value=\&quot;- responsible for the ideation and design phase of forge&amp;lt;div&amp;gt;- directly interacted with by user. Given this it would be best placed as agent skills/personas that integrate directly with claude, github copilot, codex, etc rather than being a self baked agent. This allows the power and updates pushed frequently to these agentic wrappers to be utilised by the system. Also allows users of forge to easily modify, update, or supplement with other skills they already use into the forge workflow&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- Primary purpose is to design roadmaps for forge managed projects with the user through ideation, existing project roadmaps and learnings captured from previous sessions and forge cycles.&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- Once the user has confirmed the direction and general goals of the new or updated roadmap are acceptable the architect is responsible for breaking these into initiatives that will move the project to that end state. Initiatives are a collection of several features that would be picked up by the project manager agent to break down further into work items&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- The architect should understand that an initiative will be worked on entirely by agents in the subsequent forge cycle steps until the review loop is reached which is the next human interaction point&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;.&amp;lt;/span&amp;gt;&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- The architect should utilise skills like the LLM Council to analyse the same user prompts from several angles and ensure solid principles are established for each initiative&amp;lt;/span&amp;gt;&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- features and initiatives must establish clear interdependencies&amp;lt;/span&amp;gt;&amp;lt;/div&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;320\&quot; width=\&quot;430\&quot; y=\&quot;20\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-17\&quot; connectable=\&quot;0\&quot; parent=\&quot;1\&quot; style=\&quot;group\&quot; value=\&quot;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;340\&quot; width=\&quot;430\&quot; x=\&quot;190\&quot; y=\&quot;180\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-18\&quot; parent=\&quot;fAGNB5-M9GKBdq2qCchY-17\&quot; style=\&quot;swimlane;whiteSpace=wrap;html=1;\&quot; value=\&quot;Project Manager\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;340\&quot; width=\&quot;430\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-19\&quot; parent=\&quot;fAGNB5-M9GKBdq2qCchY-17\&quot; style=\&quot;text;html=1;whiteSpace=wrap;strokeColor=none;fillColor=none;align=left;verticalAlign=middle;rounded=0;\&quot; value=\&quot;- responsible for breaking down initiative features into work items for agents to pick up&amp;lt;div&amp;gt;- work items must follow well established principles for agentic development in particular spec driven development&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- work items must have a consistent and well defined spec/PRD format that ensures clear feedback signals that allow an agentic developer loop to get fast feedback through testing and establish the success signals that a development agent must reach to call a work item complete&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- work items must be designed with the idea of agentic development loops in mind where the developer loop may go through several iterations in order to actually call a work item complete and must establish clear principles that allow this rather than forcing the developer loop to try and &amp;quot;one shot&amp;quot; the work item in a single loop&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- work items must establish clear interdependencies that in combination with the same established for the initiatives and features allow parallel work in developer loops wherever possible&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- Project manager must reference the brain knowledge base as the first source of knowledge. The project manager may research more broadly - including online - than this when it cannot confidently answer from the brain alone&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- project manager must be entirely automated without any human input required with effective logging that can be used in reflection to judge it&amp;#39;s behaviour&amp;lt;/div&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;320\&quot; width=\&quot;430\&quot; y=\&quot;20\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-20\&quot; connectable=\&quot;0\&quot; parent=\&quot;1\&quot; style=\&quot;group\&quot; value=\&quot;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;340\&quot; width=\&quot;430\&quot; x=\&quot;640\&quot; y=\&quot;180\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-21\&quot; parent=\&quot;fAGNB5-M9GKBdq2qCchY-20\&quot; style=\&quot;swimlane;whiteSpace=wrap;html=1;\&quot; value=\&quot;Developer Loop\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;340\&quot; width=\&quot;430\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-22\&quot; parent=\&quot;fAGNB5-M9GKBdq2qCchY-20\&quot; style=\&quot;text;html=1;whiteSpace=wrap;strokeColor=none;fillColor=none;align=left;verticalAlign=middle;rounded=0;\&quot; value=\&quot;- responsible for the development, testing, review and closure of work items into the initiative branch created off main for any project in the forge system&amp;lt;div&amp;gt;- must use existing agentic loop tools rather than a self baked system. These tools have gained significant maturity over something I could bake myself and will bring along with them well established principles that the rest of the forge system can grow around&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- must use the best practices established by existing agentic loops such as hermes, openclaw, and ralph loops rather than modifying them to fit into the forge system the forge components around the developer loop must be changed to fit whatever agentic loop is used&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- ideally would allow for swap out of agentic loop tools so they can be evaluated against each other - I&amp;#39;ve personally heard good things about hermes though so that would be a valid first candidate&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- the developer loop is entirely automated for a full initiative - a developer loop is complete once all work items and features have been completed into the initiative branch, passing all checks for each work item and feature along the way&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- The developer loop must be prepared to take the spec format that is decided on for the project manager loop and must be optimised for this format&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- the developer loop can have several agentic loops all working at once and so must have the ability to resolve merge conflicts as these individual agents complete work items&amp;lt;/div&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;320\&quot; width=\&quot;430\&quot; y=\&quot;20\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-23\&quot; connectable=\&quot;0\&quot; parent=\&quot;1\&quot; style=\&quot;group\&quot; value=\&quot;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;340\&quot; width=\&quot;430\&quot; x=\&quot;1090\&quot; y=\&quot;180\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-24\&quot; parent=\&quot;fAGNB5-M9GKBdq2qCchY-23\&quot; style=\&quot;swimlane;whiteSpace=wrap;html=1;\&quot; value=\&quot;Review Loop\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;340\&quot; width=\&quot;430\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-25\&quot; parent=\&quot;fAGNB5-M9GKBdq2qCchY-23\&quot; style=\&quot;text;html=1;whiteSpace=wrap;strokeColor=none;fillColor=none;align=left;verticalAlign=middle;rounded=0;\&quot; value=\&quot;- responsible for the closeout of an initiative back into main for any given project&amp;lt;div&amp;gt;- the review loop must start by the agent evaluating the state of the project after an initiative has been completed. This evaluation must include resolution of any errors or functionality issues - the project must be functional before human review is requested&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- The review loop must prepare a functional demonstration of the changes implemented in the feature. The user reviewing the initiative work must be presented a pull request with confirmed working code and a demo script that they can use to understand the functional changes made&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- Once the human reviewer has completed their review they will have either confirmed the change or provided feedback that must be rolled into the change before closeout. In the latter case this must trigger subsequent agentic loops that drive the initiative to the point the user is happy, each agentic loop at this point would end with a human review, given this it may again actually work best as agent skills/persona that the human user can utilise within agentic wrappers as described in the architect section&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- Once final approval is provided by the user the PR into main is merged and the initiative is marked complete&amp;lt;/div&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;320\&quot; width=\&quot;430\&quot; y=\&quot;20\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-27\&quot; connectable=\&quot;0\&quot; parent=\&quot;1\&quot; style=\&quot;group\&quot; value=\&quot;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;340\&quot; width=\&quot;430\&quot; x=\&quot;1540\&quot; y=\&quot;180\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-28\&quot; parent=\&quot;fAGNB5-M9GKBdq2qCchY-27\&quot; style=\&quot;swimlane;whiteSpace=wrap;html=1;\&quot; value=\&quot;Reflection\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;340\&quot; width=\&quot;430\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fAGNB5-M9GKBdq2qCchY-29\&quot; parent=\&quot;fAGNB5-M9GKBdq2qCchY-27\&quot; style=\&quot;text;html=1;whiteSpace=wrap;strokeColor=none;fillColor=none;align=left;verticalAlign=middle;rounded=0;\&quot; value=\&quot;- After closeout of an initiative reflection is kicked off&amp;lt;div&amp;gt;- reflection should have 3 scopes:&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;&amp;lt;blockquote style=&amp;quot;margin: 0 0 0 40px; border: none; padding: 0px;&amp;quot;&amp;gt;&amp;lt;div&amp;gt;- agentic self reflection where the agent reviews how it performed itself, digesting the logs that must be output by agents throughout the whole cycle, how many iterations agents needed to loop through for work items, features, review, and the initiative as a whole, anti patterns that appear to have entered into the flow, etc.&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- Agentic prompted user questions. Based on the above review the agent should pose questions to the user for anything it wants clarification on. These should not invalidate the agents own self review, instead should be supplemental or only asked for in situations where the agent isnt clear how it should interpret something based on best practices and core principles established in forge already&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- pure user feedback. Similarly to the agents own self review this section should allow for the user to provide feedback on things they noticed in observing the agents work themselves.&amp;lt;/div&amp;gt;&amp;lt;/blockquote&amp;gt;- All reflection is then sent to the brain ingest for processing in the format that component expects. This is the basis for forge to learn cycle over cycle and improve the more it is utilised.&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;- Again for simplicity and preparedness to take benefits of the AI space improving as a whole this is best served as agent skills/persona for use in foundation agentic wrappers&amp;lt;/div&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;m
